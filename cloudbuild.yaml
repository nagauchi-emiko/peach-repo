steps:
  # 1. Dockerイメージのビルド
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/slack-app-repo/helloslackbolt:$BUILD_ID'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/slack-app-repo/helloslackbolt:latest'
      - '.'

  # 2. Artifact Registryへのプッシュ
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/slack-app-repo/helloslackbolt:$BUILD_ID'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/slack-app-repo/helloslackbolt:latest'

  # 3. Cloud Runへのデプロイ
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'helloslackbolt'
      - '--image'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/slack-app-repo/helloslackbolt:$BUILD_ID'
      - '--region'
      - 'asia-northeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--quiet'
      # 環境変数を直接指定 (これが確実です)
      - '--set-env-vars'
      - 'ENVIRONMENT=production,GCP_PROJECT_ID=$PROJECT_ID'
      # シークレットをファイルとしてマウント
      - '--update-secrets'
      - '/etc/secrets/google/client_secret.json=GOOGLE_CLIENT_SECRET_JSON:latest'
      - '--max-instances'
      - '10'
      - '--memory'
      - '512Mi'

images:
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/slack-app-repo/helloslackbolt:$BUILD_ID'
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/slack-app-repo/helloslackbolt:latest'