steps:
  # Dockerイメージのビルド
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/slack-invoice-repo/slack-invoice-app:$COMMIT_SHA'
      - '-t'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/slack-invoice-repo/slack-invoice-app:latest'
      - '.'

  # Artifact Registryへのプッシュ（COMMIT_SHA版）
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/slack-invoice-repo/slack-invoice-app:$COMMIT_SHA'

  # Artifact Registryへのプッシュ（latest版）
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/slack-invoice-repo/slack-invoice-app:latest'

  # Cloud Runへのデプロイ
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'slack-invoice-app'
      - '--image'
      - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/slack-invoice-repo/slack-invoice-app:$COMMIT_SHA'
      - '--region'
      - 'asia-northeast1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--set-env-vars'
      - 'GCP_PROJECT_ID=$PROJECT_ID,ENVIRONMENT=production'
      - '--service-account'
      - 'slack-invoice-app@$PROJECT_ID.iam.gserviceaccount.com'
      - '--max-instances'
      - '100'
      - '--memory'
      - '512Mi'
      - '--timeout'
      - '60s'

images:
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/slack-invoice-repo/slack-invoice-app:$COMMIT_SHA'
  - 'asia-northeast1-docker.pkg.dev/$PROJECT_ID/slack-invoice-repo/slack-invoice-app:latest'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'

timeout: 1200s